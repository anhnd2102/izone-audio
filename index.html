<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IZONE – Audio Exam</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&family=Open+Sans:wght@400;600;700&family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" href="assets/img/favicon.png">
</head>
<body>
  <div class="card index-card">

    <div class="card-header">
      <div class="header-logo" id="headerLogo">
        <img src="assets/img/logo.png" alt="IZONE"
          onerror="document.getElementById('headerLogo').classList.add('failed')">
        <span class="logo-text-fallback">IZONE</span>
      </div>
      <div class="header-divider"></div>
      <div class="header-info">
        <div class="header-tagline">IELTS Chiến Lược</div>
        <div class="header-test-name">Danh sách bài thi</div>
      </div>
    </div>

    <div class="card-body">
      <p class="index-intro">
        Chọn bài thi theo hướng dẫn của giáo viên.<br>
        Mỗi bài chỉ nghe được <strong style="color:rgba(255,255,255,0.85)">1 lần</strong> trong khung giờ quy định.
      </p>
      <div class="test-list" id="testList"></div>
    </div>

    <div class="card-footer">IZONE &nbsp;·&nbsp; IELTS CHIẾN LƯỢC</div>
  </div>

  <script>
    const TESTS = [
      { id: 'test-1', name: 'Test 1 Phase 1', href: '1xjm77.html' },
      { id: 'test-2', name: 'Test 2 Phase 1', href: '666w9y.html' },
      { id: 'test-3', name: 'Test 3 Phase 1', href: 'v527aj.html' },
      { id: 'test-4', name: 'Test 4 Phase 1', href: 'y6d5mf.html' },
      { id: 'test-5', name: 'Test 5 Phase 1', href: 'pmw99z.html' },
      { id: 'test-6', name: 'Test 1 Phase 2', href: 'oz0zih.html' },
    ];

    const list = document.getElementById('testList');

    TESTS.forEach(function (t, i) {
      const played = localStorage.getItem('izone_played_' + t.id) === '1';
      const badge  = played
        ? '<span class="badge badge-done">✓ Đã nghe</span>'
        : '<span class="badge badge-pending">Chưa nghe</span>';

      const item = document.createElement('a');
      item.href = t.href;
      item.className = 'test-item';
      item.innerHTML = `
        <div class="test-item-left">
          <div class="test-num">${i + 1}</div>
          <div>
            <div class="test-name">${t.name}</div>
            <div class="test-sub">IELTS Listening &nbsp;·&nbsp; 18:45 – 19:05</div>
          </div>
        </div>
        <div class="test-right">
          ${badge}
          <span class="arrow">›</span>
        </div>
      `;
      list.appendChild(item);
    });
  </script>
</body>
</html>
